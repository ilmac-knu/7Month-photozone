<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2026년 7월 일맥 정기모임 AI 포토존</title>

<link rel="preload" as="image" href="royal_self.png">
<link rel="preload" as="image" href="royal_people.png">
<link rel="preload" as="image" href="royal_single.png">
<link rel="preload" as="image" href="royal_couple.png">

<style>
html, body {
  margin:0;
  padding:0;
  overflow:hidden;
  height:100%;
  background:#000;
  font-family:Arial, sans-serif;
}

#loading {
  position:fixed;
  inset:0;
  z-index:9999;
  background:linear-gradient(180deg,#6b1f1f,#1c0d0d);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:20px;
  line-height:1.6;
}

#camera, #overlay {
  position:fixed;
  left:0;
  top:0;
  width:100vw;
  height:100vh;
}

#camera {
  object-fit:cover;
  z-index:1;
  background:#000;
}

#overlay {
  object-fit:contain;
  z-index:2;
  pointer-events:none;
  visibility:hidden;
  transform:scale(1);
}

#menu {
  position:fixed;
  z-index:10;
  inset:0;
  background:linear-gradient(180deg,#2b0f0f,#000);
  color:white;
  text-align:center;
  overflow-y:auto;
  padding:28px 0 40px;
  display:none;
}

#menu h1 {
  font-size:25px;
  color:#ffd966;
  margin:8px 0;
}

.subtitle {
  font-size:16px;
  margin-bottom:20px;
  color:#eee;
}

.mode-card {
  width:86%;
  max-width:420px;
  margin:14px auto;
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.22);
}

.mode-card img {
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
  background:#222;
}

.mode-card button,
#captureBtn,
#closeResultBtn {
  width:100%;
  padding:15px 10px;
  font-size:19px;
  font-weight:bold;
  border-radius:14px;
  border:none;
  color:white;
}

.self-btn { background:#7a1f1f; }
.people-btn { background:#6a329f; }
.single-btn { background:#1f4e79; }
.couple-btn { background:#38761d; }

#changeBtn {
  position:fixed;
  right:12px;
  top:12px;
  z-index:30;
  padding:9px 12px;
  border-radius:10px;
  border:none;
  background:rgba(0,0,0,.65);
  color:white;
  font-size:14px;
  display:none;
}

#captureGuide {
  position:fixed;
  left:12px;
  top:12px;
  z-index:30;
  padding:9px 12px;
  border-radius:10px;
  background:rgba(0,0,0,.65);
  color:white;
  font-size:13px;
  line-height:1.4;
  display:none;
}

#scaleControls {
  position:fixed;
  left:5%;
  bottom:76px;
  width:90%;
  z-index:45;
  display:none;
  gap:8px;
}

#scaleControls button {
  flex:1;
  padding:12px 4px;
  border:none;
  border-radius:12px;
  background:rgba(0,0,0,.7);
  color:white;
  font-size:16px;
  font-weight:bold;
}

#guide {
  position:fixed;
  bottom:138px;
  left:4%;
  width:92%;
  z-index:20;
  color:white;
  font-size:14px;
  text-align:center;
  text-shadow:2px 2px 5px black;
  line-height:1.5;
  pointer-events:none;
}

#captureBtn {
  position:fixed;
  left:5%;
  bottom:18px;
  width:90%;
  z-index:40;
  background:#c00000;
  display:none;
}

#resultScreen {
  position:fixed;
  inset:0;
  z-index:100;
  background:rgba(0,0,0,.96);
  display:none;
  color:white;
  text-align:center;
  overflow-y:auto;
  padding:20px 0 40px;
}

#resultImage {
  width:94%;
  max-width:520px;
  border-radius:12px;
  margin-top:12px;
}

#closeResultBtn {
  width:86%;
  max-width:420px;
  margin-top:18px;
  background:#1f4e79;
}
</style>
</head>

<body>

<div id="loading">
  <div>
    👑 AI 포토존을 준비하고 있습니다.<br>
    잠시만 기다려 주세요.
  </div>
</div>

<video id="camera" autoplay playsinline muted></video>
<img id="overlay" src="">

<div id="captureGuide">촬영 버튼으로<br>인증샷을 저장하세요</div>

<div id="menu">
  <h1>2026년 7월 일맥 AI 포토존</h1>
  <div class="subtitle">창덕궁 인정전 추억 인증샷</div>

  <div class="mode-card">
    <img src="royal_self.png">
    <button class="self-btn" onclick="startPhotozone('royal_self.png','user','셀프촬영 1인 상반신 전면 카메라 모드입니다. 얼굴과 상반신을 가운데 공간에 맞춰 주세요.')">
      셀프촬영<br>1인 상반신 · 전면 카메라
    </button>
  </div>

  <div class="mode-card">
    <img src="royal_people.png">
    <button class="people-btn" onclick="startPhotozone('royal_people.png','environment','타인촬영 1인 상반신 후면 카메라 모드입니다. 다른 분이 찍어줄 때 사용하세요.')">
      타인촬영<br>1인 상반신 · 후면 카메라
    </button>
  </div>

  <div class="mode-card">
    <img src="royal_single.png">
    <button class="single-btn" onclick="startPhotozone('royal_single.png','environment','타인촬영 1인 전신 후면 카메라 모드입니다. 가운데 빈 공간에 전신이 들어오도록 서 주세요.')">
      타인촬영<br>1인 전신 · 후면 카메라
    </button>
  </div>

  <div class="mode-card">
    <img src="royal_couple.png">
    <button class="couple-btn" onclick="startPhotozone('royal_couple.png','environment','타인촬영 2인 전신 후면 카메라 모드입니다. 두 분이 가운데 빈 공간에 함께 서 주세요.')">
      ❤️ 타인촬영<br>2인 전신 · 후면 카메라
    </button>
  </div>
</div>

<button id="changeBtn" onclick="showMenu()">모드 변경</button>
<div id="guide"></div>

<div id="scaleControls">
  <button onclick="scaleDown()">작게 -</button>
  <button onclick="scaleReset()">기본</button>
  <button onclick="scaleUp()">크게 +</button>
</div>

<button id="captureBtn" onclick="takePhoto()">촬영하기</button>

<div id="resultScreen">
  <h2>인증샷이 완성되었습니다</h2>
  <p>이미지를 길게 눌러 저장하거나 공유하세요.</p>
  <img id="resultImage">
  <br>
  <button id="closeResultBtn" onclick="closeResult()">다시 촬영하기</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("camera");
const overlay = document.getElementById("overlay");
const menu = document.getElementById("menu");
const guide = document.getElementById("guide");
const changeBtn = document.getElementById("changeBtn");
const captureGuide = document.getElementById("captureGuide");
const captureBtn = document.getElementById("captureBtn");
const scaleControls = document.getElementById("scaleControls");
const canvas = document.getElementById("canvas");
const resultScreen = document.getElementById("resultScreen");
const resultImage = document.getElementById("resultImage");
const loading = document.getElementById("loading");

let currentStream = null;
let currentImageFile = "";
let overlayScale = 1;

const preloadImages = [
  "royal_self.png",
  "royal_people.png",
  "royal_single.png",
  "royal_couple.png"
];

function loadImage(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = resolve;
    img.onerror = resolve;
    img.src = src;
  });
}

Promise.all(preloadImages.map(loadImage)).then(() => {
  loading.style.display = "none";
  menu.style.display = "block";
});

async function startCamera(cameraMode) {
  if (currentStream) {
    currentStream.getTracks().forEach(track => track.stop());
  }

  const stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: cameraMode },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  });

  video.srcObject = stream;
  currentStream = stream;

  return new Promise((resolve) => {
    video.onloadedmetadata = () => {
      video.play();
      resolve();
    };
  });
}

function waitOverlayLoaded(imageFile) {
  return new Promise((resolve) => {
    overlay.onload = resolve;
    overlay.onerror = resolve;
    overlay.src = imageFile;
  });
}

async function startPhotozone(imageFile, cameraMode, guideText) {
  try {
    loading.style.display = "none";
    menu.style.display = "none";
    resultScreen.style.display = "none";

    changeBtn.style.display = "none";
    captureGuide.style.display = "none";
    captureBtn.style.display = "none";
    scaleControls.style.display = "none";
    guide.innerText = "";
    overlay.style.visibility = "hidden";

    await waitOverlayLoaded(imageFile);
    await startCamera(cameraMode);

    currentImageFile = imageFile;
    overlayScale = 1;
    overlay.style.transform = "scale(1)";
    overlay.style.visibility = "visible";

    guide.innerText =
      guideText +
      "\n사람과 왕·왕비 크기가 맞지 않으면 작게/크게 버튼으로 조정하세요.";

    changeBtn.style.display = "block";
    captureGuide.style.display = "block";
    captureBtn.style.display = "block";
    scaleControls.style.display = "flex";

  } catch (err) {
    loading.style.display = "none";
    menu.style.display = "block";
    alert("카메라 사용을 허용해 주세요. 이미 거부하셨다면 브라우저 또는 카카오톡의 사이트 설정에서 카메라 권한을 허용으로 바꿔 주세요.");
  }
}

function showMenu() {
  menu.style.display = "block";
  loading.style.display = "none";
  captureBtn.style.display = "none";
  captureGuide.style.display = "none";
  scaleControls.style.display = "none";
  changeBtn.style.display = "none";
  guide.innerText = "";
  overlay.src = "";
  overlay.style.visibility = "hidden";
  overlayScale = 1;
  overlay.style.transform = "scale(1)";
}

function scaleUp() {
  overlayScale += 0.08;
  if (overlayScale > 1.8) overlayScale = 1.8;
  overlay.style.transform = `scale(${overlayScale})`;
}

function scaleDown() {
  overlayScale -= 0.08;
  if (overlayScale < 0.5) overlayScale = 0.5;
  overlay.style.transform = `scale(${overlayScale})`;
}

function scaleReset() {
  overlayScale = 1;
  overlay.style.transform = "scale(1)";
}

function takePhoto() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  canvas.width = w;
  canvas.height = h;

  const ctx = canvas.getContext("2d");

  drawCover(ctx, video, 0, 0, w, h);

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = currentImageFile;

  img.onload = function() {
    drawContainScaled(ctx, img, 0, 0, w, h, overlayScale);
    resultImage.src = canvas.toDataURL("image/png");
    resultScreen.style.display = "block";
  };
}

function drawCover(ctx, img, x, y, w, h) {
  const iw = img.videoWidth || img.width;
  const ih = img.videoHeight || img.height;
  const r = Math.max(w / iw, h / ih);
  const nw = iw * r;
  const nh = ih * r;
  ctx.drawImage(img, x + (w - nw) / 2, y + (h - nh) / 2, nw, nh);
}

function drawContainScaled(ctx, img, x, y, w, h, scale) {
  const iw = img.width;
  const ih = img.height;
  const r = Math.min(w / iw, h / ih) * scale;
  const nw = iw * r;
  const nh = ih * r;
  ctx.drawImage(img, x + (w - nw) / 2, y + (h - nh) / 2, nw, nh);
}

function closeResult() {
  resultScreen.style.display = "none";
}
</script>

</body>
</html>
